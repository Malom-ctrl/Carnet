name: Release

on:
  push:
    branches:
      - main
    paths:
      - 'apps/carnet/Cargo.toml'

jobs:
  check-version:
    name: Check Version
    runs-on: ubuntu-latest
    outputs:
      version: ${{ steps.get_version.outputs.version }}
      exists: ${{ steps.check_release.outputs.exists }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Get Version
        id: get_version
        run: |
          # Extract version from apps/carnet/Cargo.toml
          VERSION=$(grep "^version =" apps/carnet/Cargo.toml | cut -d '"' -f 2)
          echo "Detected version: $VERSION"
          echo "version=$VERSION" >> $GITHUB_OUTPUT

      - name: Check if release exists
        id: check_release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          TAG="v${{ steps.get_version.outputs.version }}"
          if gh release view "$TAG" >/dev/null 2>&1; then
            echo "Release $TAG already exists."
            echo "exists=true" >> $GITHUB_OUTPUT
          else
            echo "Release $TAG does not exist. Proceeding."
            echo "exists=false" >> $GITHUB_OUTPUT
          fi

  build:
    name: Build Release Binary
    needs: check-version
    if: needs.check-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            pkgconf-pkg-config \
            glib2-devel \
            glycin-devel \
            glycin-loaders \
            bubblewrap \
            wl-clipboard \
            gcc \
            gcc-c++ \
            make \
            rust \
            cargo \
            tar \
            gzip \
            git

      - name: Build release
        run: cargo build --release --verbose

      - name: Package
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          ARCH=$(uname -m)
          PLATFORM="linux"
          FILENAME="carnet-${VERSION}-${PLATFORM}-${ARCH}.tar.gz"
          
          mkdir -p dist
          # Copy all carnet binaries
          cp target/release/carnet dist/
          cp target/release/carnet-watch dist/
          cp target/release/carnet-preprocess dist/
          cp target/release/carnet-sandbox dist/
          cp target/release/carnet-clipboard-fetch-uris dist/
          cp README.md dist/
          
          # Create the archive
          tar -czf ${FILENAME} -C dist .
          echo "Archive created: ${FILENAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: carnet-*.tar.gz
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: [check-version, build]
    if: needs.check-version.outputs.exists == 'false'
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          VERSION="${{ needs.check-version.outputs.version }}"
          TAG="v$VERSION"
          
          gh release create "$TAG" carnet-*.tar.gz \
            --title "$TAG" \
            --generate-notes \
            --target main
