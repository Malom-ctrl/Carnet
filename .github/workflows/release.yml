name: Release

on:
  push:
    tags:
      - 'v*'

jobs:
  build:
    name: Build Release Binary
    runs-on: ubuntu-latest
    container: fedora:latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Install system dependencies
        run: |
          dnf install -y \
            pkgconf-pkg-config \
            glib2-devel \
            glycin-devel \
            glycin-loaders \
            bubblewrap \
            wl-clipboard \
            gcc \
            gcc-c++ \
            make \
            rust \
            cargo \
            tar \
            gzip

      - name: Build release
        run: cargo build --release --verbose

      - name: Package
        run: |
          VERSION=${GITHUB_REF_NAME}
          ARCH=$(uname -m)
          PLATFORM="linux"
          FILENAME="carnet-${VERSION}-${PLATFORM}-${ARCH}.tar.gz"
          
          mkdir -p dist
          # Copy all carnet binaries
          cp target/release/carnet dist/
          cp target/release/carnet-watch dist/
          cp target/release/carnet-preprocess dist/
          cp target/release/carnet-sandbox dist/
          cp target/release/carnet-clipboard-fetch-uris dist/
          cp README.md dist/
          
          # Create the archive
          tar -czf ${FILENAME} -C dist .
          echo "Archive created: ${FILENAME}"

      - name: Upload artifact
        uses: actions/upload-artifact@v4
        with:
          name: release-tarball
          path: carnet-*.tar.gz
          retention-days: 1

  publish:
    name: Publish GitHub Release
    needs: build
    runs-on: ubuntu-latest
    permissions:
      contents: write
    steps:
      - name: Download artifact
        uses: actions/download-artifact@v4
        with:
          name: release-tarball

      - name: Create Release
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
        run: |
          gh release create "${{ github.ref_name }}" carnet-*.tar.gz \
            --title "${{ github.ref_name }}" \
            --generate-notes
